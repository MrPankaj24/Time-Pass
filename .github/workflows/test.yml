name: SUSFS Patch and Collect Rejects

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  susfs-apply-patch:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout kernel_common_modifications
      uses: actions/checkout@v4
      with:
        repository: MrPankaj24/kernel_common_modifications
        path: kernel_common_modifications

    - name: Clone susfs4ksu branch
      run: |
        git clone --branch gki-android13-5.15 https://gitlab.com/simonpunk/susfs4ksu.git

    - name: Apply susfs patch (create rejects)
      run: |
        cd kernel_common_modifications
        patch -p1 < ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-android13-5.15.patch || true

    - name: Collect .rej, .orig, and patched files
      run: |
        mkdir -p artifacts/rejects
        # For each .rej, copy .rej, original file, and patched file to artifacts
        find kernel_common_modifications -type f -name '*.rej' | while read rejfile; do
          cp --parents "$rejfile" artifacts/rejects/
          basefile="${rejfile%.rej}"
          [ -f "$basefile" ] && cp --parents "$basefile" artifacts/rejects/
          origfile="${basefile}.orig"
          [ -f "$origfile" ] && cp --parents "$origfile" artifacts/rejects/
        done
        # Manifest
        find kernel_common_modifications -type f -name '*.rej' > artifacts/rejects/reject-files-manifest.txt || true

    - name: Upload patch artifacts
      uses: actions/upload-artifact@v4
      with:
        name: patch-artifacts
        path: artifacts
