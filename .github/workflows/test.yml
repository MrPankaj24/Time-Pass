name: SUSFS Patch Dry-run

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  susfs-patch-dryrun:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout kernel_common_modifications
      uses: actions/checkout@v4
      with:
        repository: MrPankaj24/kernel_common_modifications
        path: kernel_common_modifications

    - name: Clone susfs4ksu branch
      run: |
        git clone --branch gki-android13-5.15 https://gitlab.com/simonpunk/susfs4ksu.git

    - name: Apply susfs patch (dry-run)
      run: |
        cd kernel_common_modifications
        patch --dry-run -p1 < ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-android13-5.15.patch || true

    - name: Collect .rej files and manifest (if any)
      run: |
        mkdir -p artifacts/rejects
        find kernel_common_modifications -type f -name '*.rej' -exec cp --parents {} artifacts/rejects/ \;
        find kernel_common_modifications -type f -name '*.rej' > artifacts/rejects/reject-files-manifest.txt || true

    - name: Upload patch dry run artifacts
      uses: actions/upload-artifact@v4
      with:
        name: patch-dryrun-artifacts
        path: artifacts
